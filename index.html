<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Proyectos — Dev Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080b14;
      --surface: rgba(255,255,255,0.04);
      --surface-h: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.09);
      --border-h: rgba(120,180,255,0.35);
      --accent: #4f8ef7;
      --accent2: #a259ff;
      --text: #e8eaf0;
      --muted: #6b7280;
      --r: 24px;
      --ease: 0.35s cubic-bezier(0.23,1,0.32,1);
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Background blobs ── */
    .bg-canvas { position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
    .blob { position:absolute; border-radius:50%; filter:blur(110px); opacity:0.16; animation:drift 20s ease-in-out infinite alternate; }
    .blob-1 { width:650px; height:650px; background:#4f8ef7; top:-220px; left:-160px; animation-duration:22s; }
    .blob-2 { width:520px; height:520px; background:#a259ff; bottom:-100px; right:-120px; animation-duration:26s; animation-delay:-9s; }
    .blob-3 { width:360px; height:360px; background:#00e5c8; top:42%; left:50%; animation-duration:19s; animation-delay:-5s; }
    @keyframes drift { from{transform:translate(0,0) scale(1)} to{transform:translate(38px,28px) scale(1.09)} }

    /* ── Page ── */
    .page {
      position:relative; z-index:1;
      max-width:1200px;
      margin:0 auto;
      padding:0 32px 80px;
    }

    /* ── Header ── */
    header {
      text-align:center;
      padding:76px 20px 60px;
      animation:fadeUp .8s ease both;
    }
    .header-badge {
      display:inline-flex; align-items:center; gap:8px;
      background:rgba(79,142,247,.12); border:1px solid rgba(79,142,247,.3);
      color:var(--accent); padding:6px 20px; border-radius:100px;
      font-family:'Syne',sans-serif; font-weight:700; font-size:.76rem;
      letter-spacing:.09em; text-transform:uppercase; margin-bottom:22px;
    }
    .header-badge::before {
      content:''; width:7px; height:7px; background:var(--accent);
      border-radius:50%; animation:pulse-dot 1.8s ease-in-out infinite;
    }
    @keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.65)}}

    header h1 {
      font-family:'Syne',sans-serif; font-weight:800;
      font-size:clamp(2.6rem,5.5vw,4.2rem);
      letter-spacing:-.035em; line-height:1.04;
      background:linear-gradient(130deg,#fff 20%,#a4c0ff 55%,#c8a0ff 85%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      margin-bottom:14px;
    }
    header p { font-size:1.05rem; color:var(--muted); max-width:440px; margin:0 auto; line-height:1.7; }

    /* ── Grid — 3 columnas grandes ── */
    .grid {
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:28px;
    }

    /* ── Card ── */
    .card {
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:var(--r);
      backdrop-filter:blur(18px);
      display:flex;
      flex-direction:column;
      align-items:center;        /* todo centrado horizontalmente */
      text-align:center;
      padding:48px 32px 40px;
      gap:0;
      transition:var(--ease);
      animation:fadeUp .65s ease both;
      position:relative;
      overflow:hidden;
      cursor:default;
    }
    .card::before {
      content:''; position:absolute; inset:0; border-radius:var(--r);
      background:linear-gradient(135deg,rgba(79,142,247,.08),rgba(162,89,255,.05));
      opacity:0; transition:var(--ease); pointer-events:none;
    }
    .card:hover {
      transform:translateY(-10px);
      border-color:var(--border-h);
      box-shadow:0 24px 64px rgba(0,0,0,.55), 0 0 0 1px rgba(79,142,247,.14);
      background:var(--surface-h);
    }
    .card:hover::before { opacity:1; }

    /* ── Icon area ── */
    .card-icon-area {
      width:130px; height:130px;
      border-radius:28px;
      background:linear-gradient(135deg,rgba(79,142,247,.1),rgba(162,89,255,.08));
      border:1px solid rgba(255,255,255,.08);
      display:flex; align-items:center; justify-content:center;
      margin-bottom:30px;
      position:relative;
      overflow:hidden;
      flex-shrink:0;
      transition:transform var(--ease);
    }
    .card:hover .card-icon-area { transform:scale(1.06); }
    .card-icon-area .glow {
      position:absolute; inset:0;
      background:radial-gradient(ellipse at center,rgba(79,142,247,.18),transparent 70%);
    }
    .card-icon-area img {
      width:80px; height:80px;
      object-fit:contain; border-radius:12px;
      position:relative; z-index:1;
      filter:drop-shadow(0 4px 18px rgba(79,142,247,.35));
      transition:transform var(--ease);
    }
    .card:hover .card-icon-area img { transform:scale(1.08); }
    .emoji-icon {
      font-size:3.4rem; position:relative; z-index:1;
      transition:transform var(--ease);
    }
    .card:hover .emoji-icon { transform:scale(1.1); }

    /* ── Text ── */
    .card-title {
      font-family:'Syne',sans-serif; font-weight:800;
      font-size:1.45rem; color:#fff; letter-spacing:-.02em;
      margin-bottom:12px;
    }
    .card-desc {
      font-size:.92rem; color:var(--muted); line-height:1.7;
      margin-bottom:36px; flex:1;
    }

    /* ── Button ── */
    .btn-acceder {
      display:inline-flex; align-items:center; justify-content:center; gap:8px;
      padding:13px 36px;
      border-radius:12px; border:none;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#fff;
      font-family:'Syne',sans-serif; font-weight:700; font-size:.92rem;
      text-decoration:none; cursor:pointer;
      box-shadow:0 4px 22px rgba(79,142,247,.3);
      transition:var(--ease);
      width:100%;                /* ocupa el ancho y queda centrado */
      max-width:220px;
    }
    .btn-acceder:hover { filter:brightness(1.15); transform:translateY(-3px); box-shadow:0 10px 32px rgba(79,142,247,.5); }
    .btn-acceder.disabled { opacity:.35; pointer-events:none; }
    .btn-acceder svg { width:15px; height:15px; flex-shrink:0; }

    /* ── FAB ── */
    .fab {
      position:fixed; bottom:30px; right:30px; z-index:200;
      width:54px; height:54px; border-radius:50%; border:none;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#fff; font-size:1.55rem; cursor:pointer;
      box-shadow:0 8px 28px rgba(79,142,247,.4);
      display:flex; align-items:center; justify-content:center;
      transition:var(--ease);
    }
    .fab:hover { transform:scale(1.12) rotate(45deg); }

    /* ── Modal ── */
    .overlay {
      display:none; position:fixed; inset:0; z-index:500;
      background:rgba(0,0,0,.72); backdrop-filter:blur(8px);
      align-items:center; justify-content:center;
    }
    .overlay.on { display:flex; }
    .modal {
      background:#0d1120; border:1px solid var(--border);
      border-radius:24px; padding:38px; width:90%; max-width:470px;
      max-height:92vh; overflow-y:auto;
      animation:fadeUp .35s ease both;
    }
    .modal h2 { font-family:'Syne',sans-serif; font-weight:800; font-size:1.3rem; color:#fff; margin-bottom:26px; letter-spacing:-.02em; }
    .fg { margin-bottom:16px; }
    .fg label { display:block; font-family:'Syne',sans-serif; font-weight:700; font-size:.73rem; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-bottom:7px; }
    .fg input, .fg textarea {
      width:100%; padding:11px 14px;
      background:rgba(255,255,255,.04); border:1px solid var(--border);
      border-radius:10px; color:var(--text); font-size:.88rem;
      font-family:'DM Sans',sans-serif; outline:none; transition:border-color .2s;
    }
    .fg input:focus,.fg textarea:focus { border-color:var(--accent); }
    .fg input::placeholder,.fg textarea::placeholder { color:var(--muted); }
    .fg textarea { resize:vertical; min-height:72px; }
    .prev-row { display:flex; align-items:center; gap:12px; margin-top:10px; }
    .prev-box {
      width:52px; height:52px; border-radius:12px; border:1px solid var(--border);
      background:rgba(255,255,255,.04); display:flex; align-items:center; justify-content:center;
      font-size:1.55rem; overflow:hidden; flex-shrink:0;
    }
    .prev-box img { width:100%; height:100%; object-fit:contain; }
    .prev-hint { font-size:.77rem; color:var(--muted); }
    .modal-btns { display:flex; gap:10px; margin-top:24px; }
    .modal-btns .btn-acceder { max-width:none; flex:1; padding:12px 20px; }
    .btn-cancel {
      flex:1; padding:12px 20px; border-radius:10px; border:1px solid var(--border);
      background:transparent; color:var(--muted); font-family:'Syne',sans-serif;
      font-weight:700; font-size:.88rem; cursor:pointer; transition:var(--ease);
    }
    .btn-cancel:hover { border-color:var(--border-h); color:var(--text); }

    @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:none} }
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}

    /* ── Responsive ── */
    @media(max-width:900px) { .grid{ grid-template-columns:1fr 1fr; } }
    @media(max-width:560px) { .grid{ grid-template-columns:1fr; } .modal{padding:24px 18px;} }
  </style>
</head>
<body>

<div class="bg-canvas">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<div class="page">
  <header>
    <div class="header-badge">Dev Store</div>
    <h1>Mis Proyectos</h1>
    <p>Panel de inicio. Accede rápidamente a cada uno de tus sitios de proyectos.</p>
  </header>

  <div class="grid" id="grid"></div>
</div>

<button class="fab" onclick="openModal()" title="Agregar sección">+</button>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2>+ Nueva sección</h2>
    <div class="fg">
      <label>Nombre</label>
      <input id="mName" placeholder="Proyectos en Rust">
    </div>
    <div class="fg">
      <label>Descripción</label>
      <textarea id="mDesc" placeholder="Breve descripción de esta sección..."></textarea>
    </div>
    <div class="fg">
      <label>Icono — emoji o URL de imagen</label>
      <input id="mIcon" placeholder="🦀  o  https://ejemplo.com/icono.png" oninput="prevIcon(this.value)">
      <div class="prev-row">
        <div class="prev-box" id="prevBox"><span>📦</span></div>
        <span class="prev-hint">Vista previa del icono</span>
      </div>
    </div>
    <div class="fg">
      <label>URL del sitio</label>
      <input id="mUrl" type="url" placeholder="https://...">
    </div>
    <div class="modal-btns">
      <button class="btn-acceder" onclick="addSection()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Agregar
      </button>
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
    </div>
  </div>
</div>

<script>
  // ── Edita las URLs con tus sitios reales ──
  let sections = [
    {
      id: 1,
      name: "C++ y Qt",
      icon: "./picture/c++qt.png",
      desc: "Proyectos creados con C++ y Qt",
      url: "https://gbonachea.github.io/c++qt.html"
    },
    {
      id: 2,
      name: "Python",
      icon: "./picture/python.png",
      desc: "Proyectos creados con Python",
      url: "https://gbonachea.github.io/aplicationpy.html"
    },
    {
      id: 3,
      name: "Electron",
      icon: "./picture/electron.png",
      desc: "Proyectos creados con Electron",
      url: "https://gbonachea.github.io/electron.html"
    },
  ];

  function isImg(s){ return s && (/\.(png|jpg|jpeg|svg|gif|webp|ico)/i.test(s) || s.startsWith('http')); }

  function iconHTML(v){
    if(!v) return '<span class="emoji-icon">📦</span>';
    if(isImg(v)) return `<img src="${v}" alt="icon" onerror="this.outerHTML='<span class=emoji-icon>📦</span>'">`;
    return `<span class="emoji-icon">${v}</span>`;
  }

  function render(){
    document.getElementById('grid').innerHTML = sections.map((s,i)=>`
      <div class="card" style="animation-delay:${i*.08}s">
        <div class="card-icon-area">
          <div class="glow"></div>
          ${iconHTML(s.icon)}
        </div>
        <div class="card-title">${s.name}</div>
        <div class="card-desc">${s.desc}</div>
        <a href="${s.url}" class="btn-acceder${s.url==='#'?' disabled':''}">
          Acceder
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
            <polyline points="15 3 21 3 21 9"/>
            <line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
        </a>
      </div>`).join('');
  }

  function prevIcon(v){
    const box = document.getElementById('prevBox');
    box.innerHTML = isImg(v) ? `<img src="${v}" onerror="this.outerHTML='<span>❌</span>'">` : `<span style="font-size:1.5rem">${v||'📦'}</span>`;
  }
  function openModal(){ document.getElementById('overlay').classList.add('on'); }
  function closeModal(){
    document.getElementById('overlay').classList.remove('on');
    ['mName','mDesc','mIcon','mUrl'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('prevBox').innerHTML='<span>📦</span>';
  }
  document.getElementById('overlay').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeModal(); });
  function addSection(){
    const name=document.getElementById('mName').value.trim();
    if(!name){ alert('El nombre es obligatorio.'); return; }
    sections.push({ id:Date.now(), name, icon:document.getElementById('mIcon').value.trim()||'📦', desc:document.getElementById('mDesc').value.trim()||'', url:document.getElementById('mUrl').value.trim()||'#' });
    render(); closeModal();
  }

  render();
</script>
</body>
</html>
